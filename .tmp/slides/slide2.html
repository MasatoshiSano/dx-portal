<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header-bar { background: #003366; padding: 14pt 40pt; }
.content { margin: 20pt 40pt 0 40pt; }
.section { margin-bottom: 12pt; }
.label-box-red { background: #CC0000; display: inline-block; padding: 3pt 10pt; margin-bottom: 5pt; }
.label-box { background: #003366; display: inline-block; padding: 3pt 10pt; margin-bottom: 5pt; }
.detail-box { background: #F5F7FA; padding: 10pt 14pt; border-left: 4pt solid #003366; margin-top: 3pt; }
.detail-box-red { background: #FFF5F5; padding: 10pt 14pt; border-left: 4pt solid #CC0000; margin-top: 3pt; }
</style>
</head>
<body>
<div class="header-bar">
  <h1 style="color: #ffffff; font-size: 18pt; margin: 0; font-weight: bold;">この資料で伝えたいこと</h1>
</div>
<div class="content">
  <div class="section">
    <div class="label-box-red">
      <p style="color: #ffffff; font-size: 10pt; margin: 0; font-weight: bold;">今、困っていること</p>
    </div>
    <div class="detail-box-red">
      <p style="color: #333333; font-size: 11pt; margin: 0; line-height: 1.6;">バイブコーディングはしているが、やり方がバラバラ。ノウハウが共有されず、同じ失敗を繰り返している。</p>
    </div>
  </div>
  <div class="section">
    <div class="label-box">
      <p style="color: #ffffff; font-size: 10pt; margin: 0; font-weight: bold;">こうしたい</p>
    </div>
    <div class="detail-box">
      <p style="color: #333333; font-size: 11pt; margin: 0; line-height: 1.6;">全員にAI秘書がつき、秘書どうしが知識を共有する。開発だけでなく、組織の働き方も変える。</p>
    </div>
  </div>
  <div class="section">
    <div class="label-box">
      <p style="color: #ffffff; font-size: 10pt; margin: 0; font-weight: bold;">何が助かるのか</p>
    </div>
    <div class="detail-box">
      <ul style="color: #333333; font-size: 11pt; margin: 0; padding-left: 16pt; line-height: 1.8;">
        <li>誰が使っても一定の品質でアウトプットが出る</li>
        <li>個人の経験やノウハウがチームに残り、同じ失敗を繰り返さない</li>
        <li>会議や情報共有のムダが減る</li>
      </ul>
    </div>
  </div>
</div>
</body>
</html>
