<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header-bar { background: #CC0000; padding: 14pt 40pt; }
.content { margin: 16pt 40pt 0 40pt; display: flex; flex-direction: column; gap: 9pt; }
.issue-card { display: flex; flex-direction: row; gap: 14pt; align-items: flex-start; }
.number-circle {
  background: #CC0000; width: 28pt; height: 28pt; min-width: 28pt;
  border-radius: 50%; display: flex; justify-content: center; align-items: center;
}
.card-body { background: #FFF5F5; padding: 9pt 14pt; flex: 1; border-left: 3pt solid #CC0000; }
</style>
</head>
<body>
<div class="header-bar">
  <h1 style="color: #ffffff; font-size: 16pt; margin: 0; font-weight: bold;">組織でも、同じような困りごとがある</h1>
</div>
<div class="content">
  <div class="issue-card">
    <div class="number-circle"><p style="color: #ffffff; font-size: 12pt; margin: 0; font-weight: bold;">1</p></div>
    <div class="card-body">
      <p style="color: #CC0000; font-size: 11pt; margin: 0 0 2pt 0; font-weight: bold;">会議に全員参加するのがムダ</p>
      <p style="color: #333333; font-size: 9pt; margin: 0; line-height: 1.5;">自分に関係ない議題のために1時間拘束される。でも出ないと情報が入らない。</p>
    </div>
  </div>
  <div class="issue-card">
    <div class="number-circle"><p style="color: #ffffff; font-size: 12pt; margin: 0; font-weight: bold;">2</p></div>
    <div class="card-body">
      <p style="color: #CC0000; font-size: 11pt; margin: 0 0 2pt 0; font-weight: bold;">会議で決めたことが流れる</p>
      <p style="color: #333333; font-size: 9pt; margin: 0; line-height: 1.5;">決定事項が議事録に埋もれて、実行されないまま次の会議を迎える。</p>
    </div>
  </div>
  <div class="issue-card">
    <div class="number-circle"><p style="color: #ffffff; font-size: 12pt; margin: 0; font-weight: bold;">3</p></div>
    <div class="card-body">
      <p style="color: #CC0000; font-size: 11pt; margin: 0 0 2pt 0; font-weight: bold;">「あれどうなった？」の確認に時間がかかる</p>
      <p style="color: #333333; font-size: 9pt; margin: 0; line-height: 1.5;">進捗や経緯を知りたいとき、毎回誰かに聞かないといけない。</p>
    </div>
  </div>
  <div class="issue-card">
    <div class="number-circle"><p style="color: #ffffff; font-size: 12pt; margin: 0; font-weight: bold;">4</p></div>
    <div class="card-body">
      <p style="color: #CC0000; font-size: 11pt; margin: 0 0 2pt 0; font-weight: bold;">新しい人に背景を説明する余裕がない</p>
      <p style="color: #333333; font-size: 9pt; margin: 0; line-height: 1.5;">経緯が頭の中にしかないので、引き継ぎや説明が大変。</p>
    </div>
  </div>
  <div class="issue-card">
    <div class="number-circle"><p style="color: #ffffff; font-size: 12pt; margin: 0; font-weight: bold;">5</p></div>
    <div class="card-body">
      <p style="color: #CC0000; font-size: 11pt; margin: 0 0 2pt 0; font-weight: bold;">同じ質問を何度もされる</p>
      <p style="color: #333333; font-size: 9pt; margin: 0; line-height: 1.5;">一度答えたことが記録に残らず、別の人からまた同じ質問が来る。</p>
    </div>
  </div>
</div>
</body>
</html>
