<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.content { display: flex; flex-direction: row; align-items: center; gap: 20pt; margin: 0 40pt; }
.box-dev {
  border: 3pt solid #003366; border-radius: 10pt; padding: 20pt 18pt;
  text-align: center; width: 180pt; background: #F0F4FF;
}
.box-arrow { display: flex; flex-direction: column; align-items: center; gap: 4pt; }
.box-org {
  border: 3pt solid #CC6600; border-radius: 10pt; padding: 20pt 18pt;
  text-align: center; width: 180pt; background: #FFF8F0;
}
.expand-ring {
  border: 2pt dashed #006633; border-radius: 16pt; padding: 16pt 24pt;
  display: flex; flex-direction: row; align-items: center; gap: 20pt;
}
.bottom-msg { margin-top: 20pt; text-align: center; }
</style>
</head>
<body>
<div class="content">
  <div class="expand-ring">
    <div class="box-dev">
      <p style="color: #003366; font-size: 10pt; margin: 0 0 6pt 0; font-weight: bold;">開発</p>
      <p style="color: #333333; font-size: 20pt; margin: 0 0 4pt 0;">👨‍💻 ↔ 🤖</p>
      <p style="color: #666666; font-size: 8pt; margin: 0; line-height: 1.5;">壁打ち・設計・実装<br>レビュー・ノウハウ共有</p>
    </div>
    <div class="box-arrow">
      <p style="color: #006633; font-size: 24pt; margin: 0; font-weight: bold;">→</p>
      <p style="color: #006633; font-size: 8pt; margin: 0; font-weight: bold;">同じ仕組みで</p>
    </div>
    <div class="box-org">
      <p style="color: #CC6600; font-size: 10pt; margin: 0 0 6pt 0; font-weight: bold;">組織</p>
      <p style="color: #333333; font-size: 20pt; margin: 0 0 4pt 0;">👥 ↔ 🤖</p>
      <p style="color: #666666; font-size: 8pt; margin: 0; line-height: 1.5;">議事録・進捗確認<br>ナレッジ共有・引き継ぎ</p>
    </div>
  </div>
</div>
<div class="bottom-msg">
  <p style="color: #006633; font-size: 14pt; margin: 0; font-weight: bold;">秘書が知識をつなぐ仕組みは、開発以外にもそのまま使える</p>
  <p style="color: #666666; font-size: 10pt; margin: 6pt 0 0 0;">ここからは、組織での活用について</p>
</div>
</body>
</html>
